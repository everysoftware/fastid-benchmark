services:
  # SHARED
  postgresql:
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${PG_DB:-postgres}
      POSTGRES_PASSWORD: ${PG_PASS:?database password required}
      POSTGRES_USER: ${PG_USER:-postgres}
    command: >
      postgres 
      -c max_connections=500 
      -c shared_buffers=4GB 
      -c effective_cache_size=12GB 
      -c work_mem=64MB 
      -c maintenance_work_mem=1GB 
      -c random_page_cost=1.1 
      -c effective_io_concurrency=200 
      -c shared_preload_libraries='pg_stat_statements'
      -c idle_in_transaction_session_timeout=60000
      -c statement_timeout=60000
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
        - CMD-SHELL
        - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      timeout: 5s
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    ports:
      - "6432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  redis:
    env_file:
      - .env
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?redis password required}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --timeout 0
      --tcp-keepalive 300
      --maxclients 5000
      --databases 16
      --save ""
      --appendonly no
      --loglevel warning
      --io-threads 4
      --io-threads-do-reads yes
      --activerehashing yes
      --hz 10
      --dynamic-hz yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.30.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8025/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # BOUNCERS
  fastid-pgbouncer:
    env_file:
      - .env
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgres://${PG_USER:-postgres}:${PG_PASS}@postgresql:5432/${PG_FASTID_DB:-fastid}
      ADMIN_USERS: ${PG_USER:-postgres}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 100
      RESERVE_POOL_SIZE: 10
      SERVER_IDLE_TIMEOUT: 0
      SERVER_RESET_QUERY: "DISCARD ALL"
    ports:
      - "6435:5432"
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${PG_USER:-postgres} -d ${PG_FASTID_DB:-fastid}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-pgbouncer:
    env_file:
      - .env
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgres://${PG_USER:-postgres}:${PG_PASS}@postgresql:5432/${PG_KEYCLOAK_DB:-keycloak}
      ADMIN_USERS: ${PG_USER:-postgres}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 100
      RESERVE_POOL_SIZE: 10
      SERVER_IDLE_TIMEOUT: 0
      SERVER_RESET_QUERY: "DISCARD ALL"
    ports:
      - "6434:5432"
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${PG_USER:-postgres} -d ${PG_KEYCLOAK_DB:-keycloak}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  authentik-pgbouncer:
    env_file:
      - .env
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgres://${PG_USER:-postgres}:${PG_PASS}@postgresql:5432/${PG_AUTHENTIK_DB:-authentik}
      ADMIN_USERS: ${PG_USER:-postgres}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 100
      RESERVE_POOL_SIZE: 10
      SERVER_IDLE_TIMEOUT: 0
      SERVER_RESET_QUERY: "DISCARD ALL"
    ports:
      - "6433:5432"
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${PG_USER:-postgres} -d ${PG_AUTHENTIK_DB:-authentik}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # AUTHENTIK
  authentik-server:
    command: server
    depends_on:
      authentik-pgbouncer:
        condition: service_healthy
      authentik-worker:
        condition: service_started
    env_file:
      - .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: ${PG_AUTHENTIK_HOST:-authentik-pgbouncer}
      AUTHENTIK_POSTGRESQL__NAME: ${PG_AUTHENTIK_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-postgres}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.2}
    ports:
      - ${COMPOSE_PORT_HTTP:-9000}:9000
      - ${COMPOSE_PORT_HTTPS:-9443}:9443
    restart: unless-stopped
    shm_size: 512mb
    volumes:
      - ./authentik-data:/data
      - ./authentik-custom-templates:/templates
#    deploy:
#      resources:
#        limits:
#          cpus: '1'

  authentik-worker:
    command: worker
    depends_on:
      authentik-pgbouncer:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: ${PG_AUTHENTIK_HOST:-authentik-pgbouncer}
      AUTHENTIK_POSTGRESQL__NAME: ${PG_AUTHENTIK_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-postgres}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.2}
    restart: unless-stopped
    shm_size: 512mb
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./authentik-data:/data
      - ./authentik-certs:/certs
      - ./authentik-custom-templates:/templates

  # KEYCLOAK
  keycloak-server:
    env_file:
      - .env
    image: quay.io/keycloak/keycloak:latest
    command: [ "start-dev", "--health-enabled=true" ]
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${PG_KEYCLOAK_HOST:-keycloak-pgbouncer}:5432/${PG_KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${PG_USER:-postgres}
      KC_DB_PASSWORD: ${PG_PASS:?database password required}
    ports:
      - "8087:8080"
      - "10000:10000"
    depends_on:
      keycloak-pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000;echo -e 'GET /health/ready HTTP/1.1\r\nhost: http://localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      start_period: 10s
      interval: 30s
      retries: 3
      timeout: 5s
#    deploy:
#      resources:
#        limits:
#          cpus: '1'

  # FASTID
  fastid-server:
    env_file:
      - .env
    image: fastid:latest
    ports:
      - "8012:8000"
    depends_on:
      fastid-pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy

    environment:
      FASTID_DB_URL: ${FASTID_DB_URL:-postgresql+asyncpg://${PG_USER:-fastid}:${PG_PASS:?database password required}@${PG_FASTID_HOST:-fastid-pgbouncer}:5432/${PG_FASTID_DB:-fastid}}
      FASTID_REDIS_URL: ${FASTID_REDIS_URL:-redis://:${REDIS_PASSWORD:?redis password required}@redis:6379/0}
      FASTID_SMTP_ENABLED: ${FASTID_SMTP_ENABLED:-true}
      FASTID_SMTP_HOST: ${FASTID_SMTP_HOST:-mailpit}
      FASTID_SMTP_PORT: ${FASTID_SMTP_PORT:-1025}

    volumes:
      - "./certs:/opt/fastid/certs"

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/readiness" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
#    deploy:
#      resources:
#        limits:
#          cpus: '1'

volumes:
  pg_data:
    driver: local
